name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Full version string (e.g. 2026.3.0, 2026.3.1b1, 2026.3.2.dev20260322)'
        required: true
        default: '2026.3.0'

jobs:
  release:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Publish App
      run: |
        $Version = "${{ github.event.inputs.version }}"
        $NumericVersion = $Version -replace '\.dev.*$', '' -replace 'b.*$', ''
        if ($NumericVersion -match '^\d+\.\d+\.\d+$') { $NumericVersion += ".0" }
        
        dotnet publish src/HAWindowsCompanion.App/HAWindowsCompanion.App.csproj `
          -c Release `
          -r win-x64 `
          -p:PublishSingleFile=true `
          -p:SelfContained=true `
          -p:PublishReadyToRun=true `
          -p:WindowsPackageType=None `
          -p:WindowsAppSDKSelfContained=true `
          -p:WindowsSdkPackageVersion=10.0.22621.52 `
          -p:AssemblyVersion=$NumericVersion `
          -p:FileVersion=$NumericVersion `
          -p:InformationalVersion=$Version `
          -p:Version=$NumericVersion `
          --output ./publish

    - name: Create Zip
      run: |
        Compress-Archive -Path ./publish/* -DestinationPath ./HAWindowsCompanion_v${{ github.event.inputs.version }}.zip

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: HAWindowsCompanion_v${{ github.event.inputs.version }}.zip
        tag_name: ${{ github.event.inputs.version }}
        name: Release ${{ github.event.inputs.version }}
        prerelease: ${{ contains(github.event.inputs.version, 'b') || contains(github.event.inputs.version, 'dev') }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
