name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:    
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore HAWindowsCompanion.sln

      - name: Build
        run: dotnet build HAWindowsCompanion.sln --no-restore -c Release -p:Platform=x64

      - name: Test
        run: dotnet test HAWindowsCompanion.sln --no-build -c Release -p:Platform=x64 --verbosity normal
