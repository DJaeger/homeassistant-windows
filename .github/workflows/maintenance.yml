---
name: Maintenance

"on":
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # Weekly

permissions:
  contents: write
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-maintenance
  cancel-in-progress: true

jobs:
  maintenance:
    name: System Maintenance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          fetch-tags: false
          persist-credentials: false

      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 30
          keep_minimum_runs: 5

      - name: Remove old artifacts
        uses: KarbitsCode/gha-remove-artifacts@v2
        with:
          age: '1 month'
          skip-recent: 5
